name: Flight Tracker

permissions:
  contents: write

on:
  workflow_dispatch:

  schedule:
    # 09:00 (Horário de Brasília - UTC-3)
    - cron: "0 12 * * *"

    # 21:00 (Horário de Brasília - UTC-3)
    - cron: "0 0 * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Run Flight Tracker
        run: python -m src.main

      - name: Commit updated DuckDB
        run: |
          git add data/flights.duckdb

          if git diff --cached --quiet; then
            echo "✅ Nenhuma alteração no banco."
          else
            git commit -m "chore: update flight history ($(date '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi